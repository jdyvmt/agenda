<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Atheneum Brugge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 1. STRUCTUUR EN EXACTE ACHTERGRONDKLEUR */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: #f5f3f5 !important; /* Exact ingelezen kleur uit je afbeelding */
            color: #000000;
            font-family: 'Lato', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .slide-container {
            width: 100%;
            height: 100%;
            padding: 55px 70px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* 2. AGENDA BADGE */
        .agenda-badge {
            background-color: #3d9ba5; /* Exacte turkoois uit screenshot */
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 42px;
            text-transform: uppercase;
            padding: 10px 30px;
            border-radius: 18px;
            align-self: flex-start;
            letter-spacing: 1px;
            line-height: 1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 3. AGENDA MATRIX LIST */
        .agenda-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 40px; /* Rustige, consistente witruimte tussen rijen */
        }

        .agenda-row {
            display: flex;
            align-items: center;
            font-size: 50px; /* Mooi groot leesbaar op tv-scherm */
            line-height: 1.3;
        }

        /* Datum kolom links */
        .agenda-date {
            width: 250px; /* Vaste breedte voor perfecte uitlijning */
            font-family: 'Lato', sans-serif;
            font-weight: 700; /* Vetgedrukte datum zoals voorbeeld */
            color: #000000;
            text-align: left;
            flex-shrink: 0;
        }

        /* Info kolom rechts */
        .agenda-info {
            font-family: 'Lato', sans-serif;
            font-weight: 400; /* Normaal gewicht voor de tekst */
            color: #000000;
            padding-left: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Kapt heel lange teksten netjes af met ... */
        }

        .no-data {
            font-size: 32px;
            color: #7f8c8d;
            font-style: italic;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="slide-container">
    <div class="agenda-badge">Agenda</div>

    <div class="agenda-container" id="agenda-lijst">
        <div class="no-data">Even de agenda checken...</div>
    </div>
</div>

<script>
    // VERVANG HIERONDER DE LINK DOOR JOUW EIGEN GEPUBLICEERDE CSV LINK VAN DE AGENDA SPREADSHEET
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTyvvLXcOP8jfMJh0YHnYpv-tKVJ6WhbK7E6Cfn8yi5dssPWUxgGuLZ-lK8kDAomEXwvH3jwWxw7-vU/pub?output=csv';

    function splitCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(current);
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current);
        return result;
    }

    // Zet verschillende datum-notaties uit Sheets om naar een bruikbaar Date-object
    function parseSheetDate(dateStr) {
        if (!dateStr) return null;
        const cleanStr = dateStr.replace(/"/g, '').trim();
        if (cleanStr === '' || cleanStr === '-') return null;

        const parts = cleanStr.split(/[-/.]/);
        let dateObj;

        if (parts.length === 3) {
            // Formaat DD/MM/YYYY of DD-MM-YYYY
            if (parts[0].length <= 2 && parts[2].length === 4) {
                dateObj = new Date(parts[2], parts[1] - 1, parts[0]);
            } 
            // Formaat YYYY/MM/DD
            else if (parts[0].length === 4) {
                dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
            }
        }

        if (!dateObj || isNaN(dateObj.getTime())) {
            dateObj = new Date(Date.parse(cleanStr));
        }

        return (dateObj && !isNaN(dateObj.getTime())) ? dateObj : null;
    }

    // Maakt exact de opmaak: "di 2 jun" (alles in kleine letters)
    function formatToCustomAgendaDate(dateObj) {
        const dagen = ['zo', 'ma', 'di', 'wo', 'do', 'vr', 'za'];
        const maanden = ['jan', 'feb', 'mrt', 'apr', 'mei', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'];
        
        const dagNaam = dagen[dateObj.getDay()];
        const dagNummer = dateObj.getDate();
        const maandNaam = maanden[dateObj.getMonth()];
        
        return `${dagNaam} ${dagNummer} ${maandNaam}`;
    }

async function updateAgenda() {
        try {
            const uniqueUrl = `${csvUrl}&t=${new Date().getTime()}`;
            const response = await fetch(uniqueUrl);
            const rawData = await response.text();
            
            // Splits de data netjes op in rijen
            const rows = rawData.split(/\r?\n/).map(row => splitCSVLine(row));
            
            const agendaContainer = document.getElementById('agenda-lijst');
            if (!agendaContainer) return;

            // We hebben data nodig vanaf Rij 2 (index 1)
            if (rows.length < 2) {
                agendaContainer.innerHTML = '<div class="no-data">Geen agenda-items gevonden</div>';
                return;
            }
            
            const vandaag = new Date();
            vandaag.setHours(0, 0, 0, 0);

            let agendaItems = [];

            // VERTICALE FIX: We lopen van boven naar beneden door de rijen (vanaf i = 1, dus Rij 2)
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                // Sla lege rijen over of rijen die niet minstens Kolom A en B hebben
                if (!row || row.length < 2) continue;

                const dateValue = row[0]; // Kolom A: Datum
                const infoValue = row[1]; // Kolom B: Info

                if (!dateValue || !infoValue) continue;

                const parsedDate = parseSheetDate(dateValue);
                const infoText = infoValue.replace(/"/g, '').trim();

                if (!parsedDate || infoText === '' || infoText === '-') continue;
                if (parsedDate < vandaag) continue; // Verberg datums uit het verleden

                agendaItems.push({
                    dateObj: parsedDate,
                    info: infoText
                });
            }

            // REGEL: Sorteer ALTIJD chronologisch, ongeacht de invoervolgorde in Sheets
            agendaItems.sort((a, b) => a.dateObj - b.dateObj);

            if (agendaItems.length === 0) {
                agendaContainer.innerHTML = '<div class="no-data">Geen geplande activiteiten</div>';
                return;
            }

            // Bouw de HTML-rijen op (maximaal 8 items op het scherm)
            let agendaHtml = '';
            const maxItems = Math.min(agendaItems.length, 8); 

            for (let k = 0; k < maxItems; k++) {
                const item = agendaItems[k];
                const formattedDate = formatToCustomAgendaDate(item.dateObj);

                agendaHtml += `
                    <div class="agenda-row">
                        <div class="agenda-date">${formattedDate}</div>
                        <div class="agenda-info">${item.info}</div>
                    </div>
                `;
            }

            agendaContainer.innerHTML = agendaHtml;

        } catch (err) {
            console.error("Fout bij het ophalen van de agenda:", err);
            document.getElementById('agenda-lijst').innerHTML = '<div class="no-data">Fout bij inladen data. Mogelijks staat de CSV-link niet open.</div>';
        }
    }
    // Start en automatische verversing om de 2 minuten
    document.addEventListener("DOMContentLoaded", function() {
        updateAgenda();
        setInterval(updateAgenda, 120000);
    });
</script>

</body>
</html>
